PSI:
  type: univariate
  module: drift_detector
  class: PSI
  function: calculate
  name: "Population Stability Index"
  acronym: "PSI"
  version: "1.0"
  description: >
    The Population Stability Index (PSI) measures shifts in the distribution 
    of a feature between two datasets, typically to monitor changes over time 
    (e.g., training vs. test sets). PSI evaluates the divergence between 
    distributions using binned probabilities. A higher PSI value indicates 
    greater drift.
  method:
    - term_1: "Actual Distribution: Proportion of values in each bin of the test dataset."
    - term_2: "Expected Distribution: Proportion of values in each bin of the reference dataset."
    - term_3: "Logarithmic Difference: Log of the ratio between actual and expected distributions per bin."
    - full_description: >
        PSI = Σ [ (Actual - Expected) * ln(Actual / Expected) ] across all bins.
  thresholds:
    low: "< 0.1: No significant drift"
    moderate: "0.1 <= PSI < 0.25: Moderate drift, may require monitoring"
    high: ">= 0.25: High drift, requires action or investigation"
  configuration:
    method_parameters:
      - name: "bins"
        description: "Number of bins to split the data into for histogram comparison."
        default: 10
      - name: "epsilon"
        description: "Small constant to avoid log(0) and division errors in probability calculations."
        default: 1e-8
  implementation_notes:
    - "Ensure the input arrays are flattened and numeric."
    - "Handle missing values or zeros before binning to avoid bias or errors."
    - "PSI is sensitive to the number of bins and the smoothing factor; tune carefully for best results."
  parameters:
    bins: "Number of histogram bins (int)"
    epsilon: "Small value to avoid log(0) (float)"
  supports_online: false
Adwin:
  type: univariate
  module: drift_detector
  class: Adwin
  function: calculate
  name: "ADaptive WINdowing"
  acronym: "ADWIN"
  version: "1.0"
  description: >
    ADaptive WINdowing (ADWIN) is a drift detection method for univariate 
    data streams. It uses a variable-length sliding window to track changes 
    in data distribution over time. ADWIN compares sub-windows using 
    statistical bounds and detects concept drift when the difference between 
    them becomes statistically significant.
  method:
    - term_1: "Sliding Window: Dynamically adjusts size based on data changes, retaining stability or reacting to drift."
    - term_2: "Hoeffding Bound: Used to test whether distributions in the sliding window differ significantly."
    - term_3: "Change Detection: Drift is detected when sub-window statistics differ beyond the delta threshold."
    - full_description: >
        ADWIN splits the window when a statistically significant difference 
        is detected between recent and older data. It uses the Hoeffding bound 
        to determine this significance. Detected drift points are tracked as 
        the data stream is processed.
  thresholds:
    low: "< 0.05: No significant drift detected"
    moderate: "0.05 <= ADWIN < 0.1: Moderate drift, may require monitoring"
    high: ">= 0.1: High drift, requires immediate action or investigation"
  configuration:
    method_parameters:
      - name: "delta"
        description: "Confidence parameter for the Hoeffding bound. Lower values increase sensitivity."
        default: 0.002
  implementation_notes:
    - "The input test_data should be a 1D array representing a time-ordered stream."
    - "ADWIN is designed for online learning and works best with continuous data input."
    - "Drift detection occurs incrementally and does not require pre-set window sizes."
  parameters:
    delta: "Confidence value for change detection (float)"
  supports_online: true
PCA_CD:
  type: multivariate
  module: drift_detector
  class: PCA_CD
  function: calculate
  name: "PCA-based Change Detection"
  acronym: "PCA-CD"
  version: "1.0"
  description: >
    PCA-based Change Detection (PCA-CD) applies Principal Component Analysis 
    to detect drift in multivariate datasets by tracking changes in 
    data variance and structure. It compares projected distributions using 
    divergence metrics like symmetric Kullback-Leibler Divergence and 
    statistical tests such as cumulative sum of squared differences.
  method:
    - term_1: "Principal Components: Axes capturing the highest variance in the dataset after transformation."
    - term_2: "Variance Explained: Amount of total variance captured by the top principal components; large shifts may indicate drift."
    - term_3: "Cumulative Sum of Differences (CSD): Tracks magnitude of changes in projected feature space."
    - term_4: "Symmetric Kullback-Leibler Divergence: Measures divergence between reference and test distributions."
    - full_description: >
        PCA-CD detects drift by projecting data into a reduced space using PCA 
        and comparing distributions of projections over time. Drift is flagged 
        when either the variance shifts significantly or distributional 
        divergence exceeds a set threshold. The Page-Hinkley algorithm is used 
        to dynamically adjust thresholds.
  thresholds:
    low: "< 0.1: No significant drift detected"
    moderate: "0.1 <= PCA-CD < 0.25: Moderate drift, may require monitoring"
    high: ">= 0.25: High drift, requires immediate action or investigation"
  configuration:
    method_parameters:
      - name: "n_components"
        description: "Number of principal components to retain"
        default: 2
      - name: "threshold"
        description: "Threshold for cumulative differences in projected data"
        default: 0.1
      - name: "window_size"
        description: "Size of the sliding window used for PCA analysis"
        default: 100
      - name: "kl_divergence_threshold"
        description: "Threshold for symmetric KL divergence to flag drift"
        default: 0.05
  implementation_notes:
    - "Ensure input arrays are properly scaled and shaped before applying PCA."
    - "Sensitivity depends on number of components and divergence thresholds."
    - "Currently returns a placeholder response pending full implementation."
  parameters: {}
  supports_online: false
KDQTree:
  type: multivariate
  module: drift_detector
  class: KDQTree
  function: calculate
  name: "KDQ-tree Drift Detection"
  acronym: "KDQ"
  version: "1.0"
  description: >
    KDQ-tree is a method for detecting multivariate drift by partitioning the 
    feature space into hierarchical buckets using a k-d tree-like structure. 
    It evaluates shifts in the probability distribution of multidimensional 
    data by comparing observed frequencies within each partition.
  method:
    - term_1: "KD-tree Partitioning: Recursive spatial subdivision based on feature values to form buckets."
    - term_2: "Density Estimation: Estimate data density in each region for both reference and test distributions."
    - term_3: "Distributional Comparison: Compare region-based frequencies using divergence or statistical distances."
    - full_description: >
        KDQ-tree drift detection partitions multivariate data into discrete 
        regions using a k-d tree structure and compares the frequency 
        distributions between reference and test datasets. Regions with 
        significant differences are flagged as potential drift zones.
  thresholds:
    low: "< 0.1: No significant drift detected"
    moderate: "0.1 <= KDQ < 0.25: Moderate drift, may require monitoring"
    high: ">= 0.25: High drift, requires immediate action or investigation"
  configuration:
    method_parameters: []
  implementation_notes:
    - "This is a placeholder implementation; detection logic is not yet implemented."
    - "Ensure input data is in a consistent format and shape before processing."
    - "The KDQ-tree method is designed for complex, multivariate feature spaces."
  parameters: {}
  supports_online: false
KSDetector:
  type: univariate
  module: drift_detector
  class: KSDetector
  function: calculate
  name: "Kolmogorov–Smirnov Test"
  acronym: "KS"
  version: "1.0"
  description: >
    The Kolmogorov–Smirnov (KS) test is a non-parametric method for comparing 
    two univariate distributions. It measures the maximum distance between the 
    empirical cumulative distribution functions (ECDFs) of two samples.
  method:
    - term_1: "ECDF: Empirical cumulative distribution function of each dataset."
    - term_2: "D-statistic: Maximum absolute difference between ECDFs."
    - term_3: "P-value: Probability of observing the D-statistic under the null hypothesis of identical distributions."
    - full_description: >
        The KS test detects drift by calculating the largest distance between 
        the ECDFs of the reference and test datasets. A low p-value indicates 
        significant drift.
  thresholds:
    low: "p-value > 0.1: No drift"
    moderate: "0.05 <= p-value <= 0.1: Possible drift"
    high: "p-value < 0.05: Significant drift detected"
  configuration:
    method_parameters:
      - name: "alpha"
        description: "Significance level to determine drift."
        default: 0.05
  implementation_notes:
    - "Use on univariate, continuous data."
    - "The test is sensitive to shifts in both location and shape of distributions."
    - "Not ideal for highly discrete or categorical data."
  parameters:
    alpha: "Significance level for hypothesis test (float)"
  supports_online: false
MMDDetector:
  type: multivariate
  module: drift_detector
  class: MMDDetector
  function: calculate
  name: "Maximum Mean Discrepancy"
  acronym: "MMD"
  version: "1.0"
  description: >
    Maximum Mean Discrepancy (MMD) is a nonparametric kernel-based test used 
    to detect drift between two multivariate datasets. It measures the 
    difference between the means of distributions in a reproducing kernel 
    Hilbert space (RKHS).
  method:
    - term_1: "Kernel Embedding: Represent distributions via kernel functions."
    - term_2: "Reproducing Kernel Hilbert Space (RKHS): Feature space induced by the kernel."
    - term_3: "MMD Statistic: Computed as the difference of mean embeddings."
    - full_description: >
        MMD compares distributions using kernel functions (typically RBF) 
        without requiring density estimation. The test works by computing the 
        average pairwise similarities within and across datasets.
  thresholds:
    low: "< 0.01: No significant drift"
    moderate: "0.01 <= MMD < 0.05: Possible drift"
    high: ">= 0.05: Significant drift"
  configuration:
    method_parameters:
      - name: "gamma"
        description: "Kernel width for the RBF kernel function."
        default: 1.0
  implementation_notes:
    - "Works well for numeric, multivariate data."
    - "Sensitivity can be tuned via the kernel bandwidth (gamma)."
    - "Does not assume any specific distributional form."
  parameters:
    gamma: "RBF kernel gamma parameter (float)"
  supports_online: false