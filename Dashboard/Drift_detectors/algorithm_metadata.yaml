PSI:
  type: univariate
  module: univariate_drift
  function: psi_drift
  name: "Population Stability Index"
  version: "1.0"
  acronym: "PSI"
  description: "The Population Stability Index (PSI) measures shifts in the distribution of data between two populations, typically to monitor changes over time (e.g., between training and test datasets). A PSI value above a certain threshold indicates potential drift in the data distribution. PSI is a univariate method that analyzes the distribution of a single feature (or variable) at a time."    
  method: 
    - term_1: "Actual Distribution: The proportion of values in each bin of the current dataset."
    - term_2: "Expected Distribution: The proportion of values in each bin of the reference (historical) dataset."
    - term_3: "Logarithmic Difference: The log of the ratio of the actual to the expected distribution in each bin."
    - full_description: "PSI = Σ [ (Actual Distribution - Expected Distribution) * ln( Actual Distribution / Expected Distribution ) ]"
  thresholds:
    low: "< 0.1: No significant drift"
    moderate: "0.1 <= PSI < 0.25: Moderate drift, may require monitoring"
    high: ">= 0.25: High drift, requires action or investigation"
  configuration:
    method_parameters:
      - name: "bins"
        description: "Number of bins to split the data into for distribution comparison"
        default: 10
      - name: "smoothing_factor"
        description: "Factor to apply in case of zero values in either distribution to avoid log(0)"
        default: 1e-5
  implementation_notes:
    - "Ensure to handle missing or zero values in data to avoid errors in PSI calculation."
    - "PSI is sensitive to the granularity of bins and smoothing factor; fine-tuning may be required depending on the data."
  parameters:
    bins: "Number of histogram bins (int)"
    epsilon: "Small value to avoid log(0) (float)"
  supports_online: false

ADWIN:
  type: univariate
  module: univariate_drift
  function: adwin_drift
  name: "ADaptive WINdowing"
  version: "1.0"
  acronym: "ADWIN"
  type: "univariate"
  description: "ADaptive WINdowing (ADWIN) is a drift detection method designed for online learning in data streams. It maintains a variable-length sliding window that adapts its size dynamically based on observed changes in the distribution of data. ADWIN detects drift by comparing sub-windows of the data and checking for significant differences between them."
  method:
    - term_1: "Sliding Window: A dynamic window that adapts its size as drift is detected in the data stream."
    - term_2: "Hoeffding Bound: A statistical test used to determine whether the data distributions in the two sub-windows are significantly different."
    - term_3: "Change Detection: ADWIN triggers drift detection when the difference between the two sub-windows exceeds a predefined threshold."
    - full_description: "ADWIN continuously monitors a data stream and detects concept drift by comparing sub-windows of the data. When a significant difference is found between the sub-windows, ADWIN triggers a drift detection event."
  thresholds:
    low: "< 0.05: No significant drift detected"
    moderate: "0.05 <= ADWIN < 0.1: Moderate drift, may require monitoring"
    high: ">= 0.1: High drift, requires immediate action or investigation"
  configuration:
    method_parameters:
      - name: "window_size"
        description: "Initial size of the sliding window"
        default: 100
      - name: "delta"
        description: "The threshold for the Hoeffding bound to detect significant differences between sub-windows"
        default: 0.05
  implementation_notes:
    - "Ensure that the data stream is continuous without large gaps to ensure proper drift detection."
    - "ADWIN is particularly effective for online learning tasks where data is continuously incoming and changes in distribution need to be detected in real-time."
  parameters:
    delta: "Confidence parameter for ADWIN"
  supports_online: true

PCA-CD:
  type: multivariate
  module: multivariate_drift
  function: pca_cd_drift
  name: "PCA-based Change Detection (PCA-CD)"
  version: "1.0"
  acronym: "PCA-CD"
  type: "multivariate"
  description: "PCA-based Change Detection (PCA-CD) employs Principal Component Analysis (PCA) to identify shifts in multidimensional data streams. The method transforms the data into principal components (PCs) and monitors changes in their distributions. PCA reduces the dimensionality of the data, focusing on the PCs with the largest eigenvalues, which capture the majority of the variance. Drift is detected by comparing the distributions of a reference window and a test window using divergence metrics, including the symmetric Kullback-Leibler Divergence. The Page-Hinkley algorithm dynamically adjusts thresholds based on historical change-scores, reducing the need for user intervention. PCA-CD operates on univariate streams derived from PCs, efficiently detecting changes in mean, variance, and correlations while minimizing computational overhead."
  method:
    - term_1: "Principal Components: The orthogonal components that capture the variance in the data. PCA finds these components by analyzing the covariance matrix of the data."
    - term_2: "Variance Explained: PCA explains the data variance through the principal components, and any significant reduction in variance indicates a shift in the data distribution."
    - term_3: "Cumulative Sum of Differences (CSD): A statistical test to assess if the cumulative sum of squared differences between the current and previous projections is above a certain threshold."
    - term_4: "Symmetric Kullback-Leibler Divergence: A metric used to compare the distributions of the reference window and test window, assessing the divergence between them."
    - full_description: "PCA-CD detects drift by projecting the data into principal components and analyzing the variance explained by these components. Significant changes in the variance, particularly when the cumulative sum of squared differences exceeds a threshold, signal drift. The method also uses Kullback-Leibler Divergence to compare distributions and dynamically adjusts thresholds with the Page-Hinkley algorithm to enhance adaptability."
  thresholds:
    low: "< 0.1: No significant drift detected"
    moderate: "0.1 <= PCA-CD < 0.25: Moderate drift, may require monitoring"
    high: ">= 0.25: High drift, requires immediate action or investigation"
  configuration:
    method_parameters:
      - name: "n_components"
        description: "Number of principal components to retain for the change detection process"
        default: 2
      - name: "threshold"
        description: "Threshold for cumulative sum of squared differences to detect drift"
        default: 0.1
      - name: "window_size"
        description: "Size of the sliding window used for the PCA analysis"
        default: 100
      - name: "kl_divergence_threshold"
        description: "Threshold for the symmetric Kullback-Leibler Divergence used to compare distributions"
        default: 0.05
  implementation_notes:
    - "PCA-CD is sensitive to the choice of the number of principal components, the threshold for detecting drift, and the sliding window size. Tuning these parameters based on the data is essential for optimal performance."
    - "The Page-Hinkley algorithm allows the method to dynamically adjust thresholds based on historical data, reducing the need for manual configuration."
    - "This method works well for multivariate data streams where relationships between features are crucial for detecting changes in data distribution."
  parameters: {}
  supports_online: false

KDQ:
  type: multivariate
  module: multivariate_drift
  function: kdq_tree_drift
  description: "KDQ-tree method for multivariate drift detection."
  parameters: {}
